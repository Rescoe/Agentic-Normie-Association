name: ANA — Work Lifecycle

on:
  schedule:
    # Every 2 hours — enough time for LLM phases between runs
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  lifecycle:
    name: Advance work states
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: POST /api/keeper/work-lifecycle
        run: |
          STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "${{ vars.ANA_APP_URL }}/api/keeper/work-lifecycle" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.ANA_CRON_SECRET }}" \
            -d '{}')
          echo "HTTP $STATUS"
          cat /tmp/response.json | python3 -m json.tool 2>/dev/null || cat /tmp/response.json
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "Lifecycle failed with HTTP $STATUS"
            exit 1
          fi
