name: ANA — Auto Exchange

on:
  schedule:
    # Every 10 minutes — up to 12 messages/hour during active testing
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  exchange:
    name: Trigger salon exchange
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: POST /api/keeper/salon-exchange
        run: |
          STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "${{ vars.ANA_APP_URL }}/api/keeper/salon-exchange" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.ANA_CRON_SECRET }}" \
            -d '{}')
          echo "HTTP $STATUS"
          cat /tmp/response.json | python3 -m json.tool 2>/dev/null || cat /tmp/response.json
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "Exchange failed with HTTP $STATUS"
            exit 1
          fi
